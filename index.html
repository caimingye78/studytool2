<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="学习利器">
<title>⚡ 全科超级学习利器 v4.0</title>
<script>window.MathJax={tex:{inlineMath:[['$','$'],['\\(','\\)']],displayMath:[['$$','$$']]}};</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" async></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.147.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.147.0/examples/js/renderers/CSS2DRenderer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.147.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://www.geogebra.org/apps/deployggb.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"PingFang SC","Microsoft YaHei",sans-serif}
body{background:#0f1424;color:#e8ecf5;min-height:100vh}
header{background:linear-gradient(90deg,#1a2347,#2b1a47);padding:14px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
header h1{font-size:20px}
nav{display:flex;gap:6px;flex-wrap:wrap;padding:10px 16px;background:#141a30;position:sticky;top:0;z-index:10}
nav button{background:#222b4d;color:#cfd8f5;border:none;padding:9px 13px;border-radius:20px;cursor:pointer;font-size:13px}
nav button.active{background:linear-gradient(90deg,#4f6ef7,#9b59f7);color:#fff}
main{padding:16px;max-width:960px;margin:0 auto}
.page{display:none}.page.show{display:block}
.card{background:#1a2138;border:1px solid #2b3760;border-radius:14px;padding:16px;margin-bottom:14px}
.card h2{font-size:16px;color:#8fa6ff;margin-bottom:10px}
button.act{background:linear-gradient(90deg,#4f6ef7,#9b59f7);border:none;color:#fff;padding:10px 18px;border-radius:10px;cursor:pointer;font-size:14px;margin:4px 4px 4px 0}
button.sub{background:#2b3760;border:none;color:#cfd8f5;padding:8px 14px;border-radius:10px;cursor:pointer;font-size:13px;margin:4px 4px 4px 0}
select,input[type=text],input[type=password],textarea{background:#10162b;color:#fff;border:1px solid #33406e;border-radius:8px;padding:9px;font-size:14px}
.out{background:#10162b;border-radius:10px;padding:14px;margin-top:10px;min-height:40px;line-height:1.85;font-size:15px;white-space:pre-wrap;word-break:break-word}
canvas.sim{background:#0a0e1c;border-radius:10px;width:100%;touch-action:none}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin:6px 0}
.row label{font-size:13px;color:#9fb0d8}
input[type=range]{accent-color:#6c84ff}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin:6px 0}
.chips button{background:#243056;color:#cfe;border:none;padding:7px 12px;border-radius:16px;cursor:pointer;font-size:13px}
.chips.math button{background:#2e2450}.chips.chem button{background:#1f4030}.chips.bio button{background:#40331f}
.pt{display:grid;grid-template-columns:repeat(18,1fr);gap:2px}.pt button{background:#16331f;color:#cfe;border:1px solid #2e5c3a;border-radius:4px;font-size:9px;line-height:1.25;padding:2px 0;cursor:pointer}
.pt button b{font-size:12px}
#video,#vsrc{width:100%;border-radius:10px;background:#000}
img.preview{max-width:100%;border-radius:10px;margin-top:8px}
#thumbs{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}
#thumbs img{width:80px;height:80px;object-fit:cover;border-radius:8px;border:2px solid #33406e}
.tag{font-size:12px;color:#7ee0a3}
.info3d{font-size:13px;color:#7ee0a3;margin-top:6px}
.hint{font-size:13px;color:#9fb0d8;line-height:1.8}
.spin { display:inline-block; animation:r 1s linear infinite;} @keyframes r{to{transform:rotate(360deg)}}
/* 3D几何专属样式 */
.node-label{color:#7ee0a3; font-weight:bold; font-size:16px; pointer-events:none; background:rgba(0,0,0,0.3); padding:2px; border-radius:4px;}
.measure-tag{color:#f77; background:rgba(0,0,0,0.6); padding:2px 5px; border-radius:4px; font-size:12px; font-weight:bold;}
button.sub:active { background: #4f6ef7; color: #fff; }
</style>
</head>
<body>
<header><h1>⚡ 全科超级学习利器</h1><span class="tag" id="keyState"></span></header>
<nav>
<button class="active" onclick="go('learn',this)">📖 讲解</button>
<button onclick="go('chem',this)">🧪 化学生物</button>
<button onclick="go('study',this)">🦉 学霸工具</button>
<button onclick="go('mathlab',this)">📐 数学实验</button>
<button onclick="go('ggb',this)">🧮 GeoGebra</button>
<button onclick="go('geo3d',this)">🧊 立体几何3D</button>
<button onclick="go('lab',this)">🔬 2D实验</button>
<button onclick="go('lab3d',this)">🪐 3D实验</button>
<button onclick="go('quiz',this)">🎯 出题</button>
<button onclick="go('photo',this)">📷 拍照解题</button>
<button onclick="go('vidlab',this)">🎬 视频分析</button>
<button onclick="go('set',this)">⚙️ 设置</button>
</nav>
<main>

<section id="learn" class="page show">
<div class="card"><h2>⚛️ 物理知识点</h2><div class="chips" id="topicsP"></div></div>
<div class="card"><h2>📐 数学知识点</h2><div class="chips math" id="topicsM"></div></div>
<div class="card"><h2>🧪 化学知识点</h2><div class="chips chem" id="topicsC"></div></div>
<div class="card"><h2>🧬 生物知识点</h2><div class="chips bio" id="topicsB"></div></div>
<div class="card"><h2>自由提问</h2>
<div class="row">
    <input type="text" id="customTopic" placeholder="输入任意问题..." style="flex:1">
    <button class="sub" onclick="listen('customTopic')">🎤 语音</button>
    <button class="sub" onclick="scanToInput('customTopic')">📷 拍照</button>
    <button class="act" onclick="explain(qs('#customTopic').value)">讲解</button>
</div>
<div class="row"><button class="sub" onclick="speak(lastText)">🔊 朗读解答</button><button class="sub" onclick="speechSynthesis.cancel()">⏹ 停止</button></div>
<div class="out" id="learnOut">点击上方知识点开始学习。</div>
</div>
</section>

<section id="geo3d" class="page">
<div class="card">
    <h2>🧊 立体几何 3D 增强实验室</h2>
    <div class="row">
        <button class="act" onclick="qs('#geoFile').click()">📷 拍照/传图</button>
        <button class="sub" onclick="listen('geoText')">🎤 语音说题</button>
        <input type="file" id="geoFile" accept="image/*" hidden onchange="onGeoImg(this)">
        <button class="sub" onclick="solveGeo3D()">🚀 开始解析</button>
    </div>
    <textarea id="geoText" placeholder="例：正方体棱长2，求AC1的角" style="width:100%;min-height:80px;margin-top:10px"></textarea>
    <img id="geoPrev" class="preview" style="display:none">
    <div id="geoCanvasHost" style="width:100%; height:400px; background:#0a0e1c; border-radius:10px; margin-top:10px; position:relative;"></div>
    <div class="out" id="geoOut"></div>
</div>
</section>

<section id="chem" class="page"><div class="card"><h2>🧪 元素周期表</h2><div class="pt" id="ptGrid"></div><div class="out" id="ptOut">点元素。</div></div><div class="card"><h2>⚖️ 方程式配平</h2><div class="row"><input type="text" id="eqIn" placeholder="Fe+O2" style="flex:1"><button class="act" onclick="balanceEq()">解析</button></div><div class="out" id="eqOut"></div></div></section>
<section id="study" class="page"><div class="card"><h2>🦉 费曼学习法</h2><textarea id="feyText" placeholder="用自己的话讲解..."></textarea><button class="act" onclick="feynman()">提交</button><div class="out" id="feyOut"></div></div><div class="card"><h2>📕 错题本</h2><button class="sub" onclick="renderWrong()">刷新</button><div id="wrongList"></div></section>
<section id="quiz" class="page"><div class="card"><h2>🎯 自动出题</h2>
    <div class="row"><select id="qSubj" onchange="fillTopics()"><option>物理</option><option>数学</option></select><select id="qTopic"></select></div>
    <textarea id="qReq" placeholder="输入具体要求..." style="width:100%;margin:10px 0"></textarea>
    <div class="row"><button class="sub" onclick="listen('qReq')">🎤 语音</button><button class="sub" onclick="scanToInput('qReq')">📷 拍照</button><button class="act" onclick="genQuiz()">出一道题</button></div>
    <div class="out" id="quizOut"></div>
</section>
<section id="set" class="page"><div class="card"><h2>⚙️ 设置</h2><input type="password" id="cfgKey" placeholder="Key"><button class="act" onclick="saveCfg()">保存</button></div></section>
</main>

<script>
const qs=s=>document.querySelector(s);
let lastText="",lastQuestion="",lastPhotoProblem="",imgs=[],threeInited=false;

/* --- 核心导航 --- */
function go(id,btn){
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('show'));
    qs('#'+id).classList.add('show');
    document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
    if(btn) btn.classList.add('active');
    if(id==='lab3d') init3D();
    if(id==='geo3d') initGeo3D();
}

async function callAI(messages,vision,outEl){
    const key=localStorage.getItem('zk');
    if(!key){outEl.textContent='请先配置 Key';return null;}
    outEl.innerHTML='<span class="spin">⏳</span> AI 思考中...';
    try{
        const r=await fetch('https://open.bigmodel.cn/api/paas/v4/chat/completions',{
            method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
            body:JSON.stringify({model:vision?'glm-4v-flash':'glm-4-flash',messages,temperature:0.7})
        });
        const d=await r.json();
        const t=d.choices[0].message.content;
        lastText=t.replace(/[#*$\\]/g,'');
        outEl.innerHTML=t.replace(/\n/g,'<br>');
        if(window.MathJax) MathJax.typesetPromise([outEl]);
        return t;
    }catch(e){outEl.textContent='网络错误';}
}

/* --- 交互增强补丁 --- */
async function scanToInput(targetId) {
    const input = document.createElement('input');
    input.type = 'file'; input.accept = 'image/*';
    input.onchange = async () => {
        const f = input.files[0]; const rd = new FileReader();
        rd.onload = async (e) => {
            const target = qs('#' + targetId); target.value = "正在识别...";
            const res = await callAI([{role:"user", content:[{type:"text",text:"提取文本"},{type:"image_url",image_url:{url:e.target.result}}]}], true, target);
            target.value = res || "";
        };
        rd.readAsDataURL(f);
    };
    input.click();
}

function listen(id) {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) return alert('不支持语音识别');
    const r = new SR(); r.lang = 'zh-CN'; r.continuous = true; r.interimResults = true;
    const target = qs('#' + id);
    r.onresult = e => {
        let text = ""; for (let i = 0; i < e.results.length; i++) { text += e.results[i][0].transcript; }
        target.value = text;
    };
    r.start();
    window.onclick = () => { r.stop(); window.onclick = null; };
}

/* --- 物理与 3D 核心 --- */
const c1=qs('#c1'),x1=c1.getContext('2d');let projs=[];
function fire(){ projs.push({x:30,y:300,vx:80,vy:-100}); }
function drawProj(){ x1.clearRect(0,0,900,320); projs.forEach(p=>{p.x+=p.vx*0.05; p.y+=p.vy*0.05; p.vy+=9.8*0.2; if(p.y>300)p.y=300; x1.fillStyle='#ffcf5e'; x1.beginPath(); x1.arc(p.x,p.y,5,0,7); x1.fill();}); requestAnimationFrame(drawProj); }
drawProj();

let geoScene, geoGroup, geoLabelRenderer, geoImg=null;
const GeoKernel = {
    cube: (a=2) => ({ points:{A:[0,0,0],B:[a,0,0],C:[a,a,0],D:[0,a,0],A1:[0,0,a],B1:[a,0,a],C1:[a,a,a],D1:[0,a,a]}, edges:[['A','B'],['B','C'],['C','D'],['D','A'],['A1','B1'],['B1','C1'],['C1','D1'],['D1','A1'],['A','A1'],['B','B1'],['C','C1'],['D','D1']] }),
    pyramid: (a=2, h=3) => ({ points:{A:[-a/2,-a/2,0],B:[a/2,-a/2,0],C:[a/2,a/2,0],D:[-a/2,a/2,0],P:[0,0,h],O:[0,0,0]}, edges:[['A','B'],['B','C'],['C','D'],['D','A'],['A','P'],['B','P'],['C','P'],['D','P'],['P','O']] }),
    cylinder: (r=1.5, h=3.5) => ({ type:'cylinder', r, h, points:{O:[0,0,0],O1:[0,0,h],M:[r,0,0],N:[r,0,h]}, edges:[['O','O1'],['M','N']] }),
    cone: (r=1.8, h=3.5) => ({ type:'cone', r, h, points:{O:[0,0,0],P:[0,0,h],M:[r,0,0]}, edges:[['O','P']] })
};

function initGeo3D(){
    if(geoScene) return; const host = qs('#geoCanvasHost');
    geoScene = new THREE.Scene(); geoScene.background = new THREE.Color(0x0a0e1c);
    const cam = new THREE.PerspectiveCamera(45, host.clientWidth/host.clientHeight, 0.1, 1000);
    cam.position.set(10, 8, 10);
    const renderer = new THREE.WebGLRenderer({antialias:true}); renderer.setSize(host.clientWidth, host.clientHeight); host.appendChild(renderer.domElement);
    geoLabelRenderer = new THREE.CSS2DRenderer(); geoLabelRenderer.setSize(host.clientWidth, host.clientHeight);
    geoLabelRenderer.domElement.style.position = 'absolute'; geoLabelRenderer.domElement.style.top = '0';
    host.appendChild(geoLabelRenderer.domElement);
    new THREE.OrbitControls(cam, renderer.domElement);
    geoGroup = new THREE.Group(); geoScene.add(geoGroup);
    geoScene.add(new THREE.AmbientLight(0xffffff, 0.8));
    const light = new THREE.DirectionalLight(0xffffff, 0.5); light.position.set(5,10,7); geoScene.add(light);
    function anim(){ requestAnimationFrame(anim); renderer.render(geoScene, cam); geoLabelRenderer.render(geoScene, cam); }
    anim();
}

function onGeoImg(inp){ const f=inp.files[0]; const rd=new FileReader(); rd.onload=e=>{geoImg=e.target.result; qs('#geoPrev').src=geoImg; qs('#geoPrev').style.display='block';}; rd.readAsDataURL(f); }

async function solveGeo3D(){
    const txt = qs('#geoText').value; const out = qs('#geoOut'); initGeo3D();
    while(geoGroup.children.length > 0) geoGroup.remove(geoGroup.children[0]);
    let probTxt = txt;
    if(geoImg) {
        out.innerHTML = "正在解析图片...";
        const res = await callAI([{role:"user", content:[{type:"text",text:"识别题目"},{type:"image_url",image_url:{url:geoImg}}]}], true, out);
        if(res) probTxt = res; qs('#geoText').value = probTxt;
    }
    let spec = /圆柱/.test(probTxt) ? GeoKernel.cylinder() : (/圆锥/.test(probTxt) ? GeoKernel.cone() : (/棱锥/.test(probTxt) ? GeoKernel.pyramid() : GeoKernel.cube()));
    const vMap = {};
    Object.keys(spec.points).forEach(name => {
        const p = spec.points[name]; const pos = new THREE.Vector3(p[0], p[2], p[1]); vMap[name] = pos;
        const div = document.createElement('div'); div.className='node-label'; div.textContent=name;
        const lbl = new THREE.CSS2DObject(div); lbl.position.set(pos.x, pos.y+0.4, pos.z); geoGroup.add(lbl);
    });
    spec.edges.forEach(e => {
        const g = new THREE.BufferGeometry().setFromPoints([vMap[e[0]], vMap[e[1]]]);
        geoGroup.add(new THREE.Line(g, new THREE.LineBasicMaterial({color:0x33406e})));
    });
    if(spec.type==='cylinder' || spec.type==='cone'){
        const geo = spec.type==='cylinder' ? new THREE.CylinderGeometry(spec.r,spec.r,spec.h,32) : new THREE.ConeGeometry(spec.r,spec.h,32);
        geoGroup.add(new THREE.Mesh(geo, new THREE.MeshPhongMaterial({color:0x4f6ef7, transparent:true, opacity:0.3, side:THREE.DoubleSide})));
    }
    const matches = probTxt.match(/[A-Z][0-1]?[A-Z][0-1]?/g);
    if(matches) matches.forEach(m => {
        const p1=m.substring(0,m.length/2), p2=m.substring(m.length/2);
        if(vMap[p1] && vMap[p2]) {
            const g = new THREE.BufferGeometry().setFromPoints([vMap[p1], vMap[p2]]);
            geoGroup.add(new THREE.Line(g, new THREE.LineBasicMaterial({color:0xffa500, linewidth:3})));
            const tagDiv = document.createElement('div'); tagDiv.className='measure-tag'; tagDiv.textContent=`L=${vMap[p1].distanceTo(vMap[p2]).toFixed(1)}`;
            const tag = new THREE.CSS2DObject(tagDiv); tag.position.copy(vMap[p1].clone().lerp(vMap[p2],0.5)); geoGroup.add(tag);
        }
    });
    await callAI([{role:"user", content:`详细解答此题：${probTxt}`}], false, out);
}

/* --- 补充缺失逻辑 --- */
function genQuiz(){ 
    const subj=qs('#qSubj').value, req=qs('#qReq').value;
    callAI([{role:'user',content: `出一道${subj}题。要求：${req}`}], false, qs('#quizOut')); 
}
function explain(t){ callAI([{role:'user',content:'讲解:'+t}],false,qs('#learnOut')); }
function speak(t){ speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(t.slice(0,3000)); u.lang='zh-CN'; speechSynthesis.speak(u); }
function saveCfg(){ localStorage.setItem('zk',qs('#cfgKey').value); alert('已保存'); }
function loadCfgUI(){ qs('#cfgKey').value=localStorage.getItem('zk')||''; }
window.onload=()=>{ loadCfgUI(); if(localStorage.getItem('zk')) qs('#keyState').textContent='✅ API 已配置'; };
</script>
</body>
</html>
